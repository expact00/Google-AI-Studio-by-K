<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI補助金申請支援システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --white: #FFFFFF;
            --border: #E5E7EB;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --gradient: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* Header */
        header {
            background: var(--gradient);
            color: var(--white);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Container & Cards */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select, textarea {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background: var(--gradient);
            color: var(--white);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Matching Results */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .subsidy-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .score-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--secondary);
            color: var(--white);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .subsidy-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-right: 3rem;
        }

        .subsidy-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            flex-grow: 1;
        }

        .subsidy-meta {
            font-size: 0.85rem;
            background: var(--bg-color);
            padding: 0.5rem;
            border-radius: 6px;
        }

        /* Document Generation */
        #doc-textarea {
            width: 100%;
            height: 300px;
            margin-top: 1rem;
            resize: vertical;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .chat-toggle {
            width: 60px;
            height: 60px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .chat-toggle:hover {
            transform: scale(1.1);
        }

        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 500px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease;
        }

        .chat-window.open {
            transform: scale(1);
        }

        .chat-header {
            background: var(--gradient);
            color: var(--white);
            padding: 1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .chat-close {
            cursor: pointer;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #F9FAFB;
        }

        .msg {
            max-width: 80%;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .msg-bot {
            background: var(--white);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .msg-user {
            background: var(--primary);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .chat-input {
            display: flex;
            padding: 0.75rem;
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .chat-input input {
            flex-grow: 1;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            background: var(--bg-color);
        }

        .chat-input button {
            background: transparent;
            border: none;
            color: var(--primary);
            font-weight: 700;
            padding: 0 1rem;
            cursor: pointer;
        }

        /* Modal */
        dialog {
            margin: auto;
            padding: 2rem;
            border: none;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 90%;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .chat-window {
                width: 300px;
                height: 450px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-title">💡 AI補助金申請ナビ</div>
            <button class="btn btn-outline" onclick="openSettings()">⚙️ API設定</button>
        </div>
    </header>

    <main class="container">
        <!-- 企業情報入力セクション -->
        <section class="card" id="section-profile">
            <h2>🏢 企業情報入力</h2>
            <form id="profile-form" onsubmit="handleMatch(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="industry">業種</label>
                        <select id="industry" required>
                            <option value="">選択してください</option>
                            <option value="製造業">製造業</option>
                            <option value="卸売業">卸売業</option>
                            <option value="小売業">小売業</option>
                            <option value="サービス業">サービス業</option>
                            <option value="IT・情報通信業">IT・情報通信業</option>
                            <option value="建設業">建設業</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">所在地（都道府県）</label>
                        <select id="location" required>
                            <option value="">選択してください</option>
                            <option value="北海道">北海道</option>
                            <option value="東京都">東京都</option>
                            <option value="大阪府">大阪府</option>
                            <option value="愛知県">愛知県</option>
                            <option value="福岡県">福岡県</option>
                            <option value="その他">その他（全国）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="employees">従業員数 (名)</label>
                        <input type="number" id="employees" min="0" required placeholder="例: 15">
                    </div>
                    <div class="form-group">
                        <label for="capital">資本金 (万円)</label>
                        <input type="number" id="capital" min="0" required placeholder="例: 1000">
                    </div>
                    <div class="form-group full-width">
                        <label for="business_content">事業内容・現在の課題・やりたいこと</label>
                        <textarea id="business_content" rows="3" required placeholder="例: 小売業を営んでいるが、ECサイトを構築して全国展開したい。またバックオフィス業務をデジタル化したい。"></textarea>
                    </div>
                    <div class="form-group full-width" style="margin-top: 1rem;">
                        <button type="submit" class="btn btn-primary" id="btn-match">🎯 適合する補助金をAIマッチング</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- マッチング結果セクション -->
        <section class="card hidden" id="section-matching">
            <h2>📊 マッチング結果</h2>
            <p style="margin-bottom: 1rem; color: var(--text-light);">入力された情報をもとに、適合する可能性が高い順に表示しています。</p>
            <div class="results-grid" id="matching-results">
                <!-- JSで動的に追加 -->
            </div>
        </section>

        <!-- 申請書作成セクション -->
        <section class="card hidden" id="section-document">
            <h2>📝 申請書自動生成 (<span id="doc-subsidy-name"></span>)</h2>
            <p style="margin-bottom: 1rem; color: var(--text-light);">AIが申請書類の「事業計画」部分のドラフトを作成します。※Gemini APIキーの登録が必要です。</p>
            <button id="btn-generate" class="btn btn-primary" onclick="generateDocument()">✨ AIでドラフトを作成する</button>
            <textarea id="doc-textarea" class="hidden" placeholder="ここに生成された申請書のドラフトが表示されます。自由に編集可能です。"></textarea>
        </section>
    </main>

    <!-- チャットボットウィジェット -->
    <div class="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <span>🤖 補助金AI相談室</span>
                <span class="chat-close" onclick="toggleChat()">✖</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- メッセージはJSで追加 -->
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input-text" placeholder="補助金について質問する..." onkeypress="handleChatKeypress(event)">
                <button onclick="sendChat()">送信</button>
            </div>
        </div>
        <div class="chat-toggle" onclick="toggleChat()">💬</div>
    </div>

    <!-- API設定モーダル -->
    <dialog id="settings-modal">
        <h2 style="border:none; margin-bottom: 0.5rem;">⚙️ Gemini API 設定</h2>
        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1.5rem;">
            AI機能（申請書生成・チャットボット）を利用するには Google Gemini API キーが必要です。
        </p>
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="api-key">APIキー</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button class="btn btn-outline" style="color:var(--text-main); border-color:var(--border);" onclick="closeSettings()">キャンセル</button>
            <button class="btn btn-primary" onclick="saveSettings()">保存する</button>
        </div>
    </dialog>

    <script>
        // --- 状態管理 ---
        let userProfile = {};
        let selectedSubsidy = null;
        let chatHistory = [];

        // --- 補助金データベース (モック) ---
        const subsidyDB = [
            {
                id: "it",
                title: "IT導入補助金",
                purpose: "業務効率化・売上アップをサポートするITツールの導入経費を補助",
                max_amount: "最大 450万円",
                rate: "1/2 〜 3/4",
                matchLogic: (p) => {
                    let score = 50;
                    const text = p.business_content;
                    if (text.includes("IT") || text.includes("デジタル") || text.includes("システム") || text.includes("EC") || text.includes("効率")) score += 30;
                    if (p.employees < 50) score += 15;
                    return Math.min(score, 95);
                }
            },
            {
                id: "mono",
                title: "ものづくり補助金",
                purpose: "革新的サービス開発・試作品開発・生産プロセスの改善に向けた設備投資を支援",
                max_amount: "最大 3,000万円",
                rate: "1/2 〜 2/3",
                matchLogic: (p) => {
                    let score = 40;
                    const text = p.business_content;
                    if (p.industry === "製造業") score += 20;
                    if (text.includes("開発") || text.includes("設備") || text.includes("試作") || text.includes("生産")) score += 30;
                    if (p.capital > 0) score += 5;
                    return Math.min(score, 90);
                }
            },
            {
                id: "jizokuka",
                title: "小規模事業者持続化補助金",
                purpose: "小規模事業者の販路開拓や業務効率化の取り組みを支援",
                max_amount: "最大 200万円",
                rate: "2/3",
                matchLogic: (p) => {
                    let score = 20;
                    let isSmall = false;
                    if (["卸売業", "小売業", "サービス業"].includes(p.industry) && p.employees <= 5) isSmall = true;
                    else if (p.employees <= 20) isSmall = true;
                    
                    if (isSmall) {
                        score = 60;
                        const text = p.business_content;
                        if (text.includes("販路") || text.includes("広告") || text.includes("店舗") || text.includes("展示会")) score += 30;
                    }
                    return Math.min(score, 98);
                }
            },
            {
                id: "saikouchiku",
                title: "事業再構築補助金",
                purpose: "新市場進出、事業・業種転換、事業再編などの思い切った事業再構築を支援",
                max_amount: "最大 1.5億円",
                rate: "1/2 〜 2/3",
                matchLogic: (p) => {
                    let score = 50;
                    const text = p.business_content;
                    if (text.includes("新規") || text.includes("転換") || text.includes("新事業") || text.includes("再編")) score += 40;
                    return Math.min(score, 92);
                }
            }
        ];

        // --- 初期化 ---
        window.onload = () => {
            // APIキーの復元
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;

            // チャットの初期化
            addChatMessage("bot", "こんにちは！AI補助金コンサルタントです。<br>補助金に関する疑問や、自社で使える補助金についてお気軽にご質問ください。<br>※ご利用前に右上の「API設定」からGeminiのAPIキーをご登録ください。");
        };

        // --- APIキー設定 ---
        const modal = document.getElementById('settings-modal');
        function openSettings() { modal.showModal(); }
        function closeSettings() { modal.close(); }
        function saveSettings() {
            const key = document.getElementById('api-key').value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                alert("APIキーを保存しました。");
                closeSettings();
            } else {
                alert("APIキーを入力してください。");
            }
        }

        // --- マッチング処理 ---
        function handleMatch(e) {
            e.preventDefault();
            
            // プロフィール取得
            userProfile = {
                industry: document.getElementById('industry').value,
                location: document.getElementById('location').value,
                employees: parseInt(document.getElementById('employees').value, 10),
                capital: parseInt(document.getElementById('capital').value, 10),
                business_content: document.getElementById('business_content').value
            };

            const btn = document.getElementById('btn-match');
            btn.innerHTML = '<span class="loader"></span> 判定中...';
            btn.disabled = true;

            // 擬似的な処理時間でUIをリッチに
            setTimeout(() => {
                const results = subsidyDB.map(s => {
                    return { ...s, score: s.matchLogic(userProfile) };
                }).sort((a, b) => b.score - a.score);

                renderResults(results);
                
                btn.innerHTML = '🎯 適合する補助金をAIマッチング';
                btn.disabled = false;

                const sec = document.getElementById('section-matching');
                sec.classList.remove('hidden');
                sec.scrollIntoView({ behavior: 'smooth', block: 'start' });

            }, 800);
        }

        function renderResults(results) {
            const container = document.getElementById('matching-results');
            container.innerHTML = '';

            results.forEach(res => {
                let color = res.score >= 80 ? '#10B981' : (res.score >= 50 ? '#F59E0B' : '#EF4444');
                
                const card = document.createElement('div');
                card.className = 'subsidy-card';
                card.innerHTML = `
                    <div class="score-badge" style="background:${color}">適合率 ${res.score}%</div>
                    <div class="subsidy-title">${res.title}</div>
                    <div class="subsidy-desc">${res.purpose}</div>
                    <div class="subsidy-meta">
                        <strong>最大補助額:</strong> ${res.max_amount} <br>
                        <strong>補助率:</strong> ${res.rate}
                    </div>
                    <button class="btn btn-outline" style="color:var(--primary); border-color:var(--primary); width:100%; margin-top:auto;" onclick="openDocumentSection('${res.id}')">
                        📝 この補助金で申請書を作成
                    </button>
                `;
                container.appendChild(card);
            });
        }

        // --- 申請書作成処理 ---
        function openDocumentSection(id) {
            selectedSubsidy = subsidyDB.find(s => s.id === id);
            document.getElementById('doc-subsidy-name').innerText = selectedSubsidy.title;
            
            const sec = document.getElementById('section-document');
            sec.classList.remove('hidden');
            document.getElementById('doc-textarea').classList.add('hidden');
            document.getElementById('doc-textarea').value = "";
            
            sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function generateDocument() {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                alert("Gemini APIキーが設定されていません。右上の「API設定」から登録してください。");
                return;
            }

            const btn = document.getElementById('btn-generate');
            btn.innerHTML = '<span class="loader"></span> AIが執筆中...';
            btn.disabled = true;

            const prompt = `あなたは中小企業診断士であり、プロの補助金申請コンサルタントです。
以下の企業情報をもとに、「${selectedSubsidy.title}」の申請に向けた事業計画書（申請書類）のドラフトを作成してください。

【企業情報】
業種: ${userProfile.industry}
従業員数: ${userProfile.employees}名
資本金: ${userProfile.capital}万円
所在地: ${userProfile.location}
事業内容および現在の課題: ${userProfile.business_content}

【対象の補助金】
名称: ${selectedSubsidy.title}
目的: ${selectedSubsidy.purpose}

【出力構成要件】
1. 企業概要と現状の課題分析（強み・弱みなど）
2. 補助事業の具体的な内容（何を導入・開発するか）
3. 期待される効果と将来展望（定量的・定性的な成果）

ですます調で、審査員を説得できるような論理的でプロフェッショナルな文章を出力してください。`;

            try {
                const text = await callGeminiAPI(apiKey, prompt);
                const textarea = document.getElementById('doc-textarea');
                textarea.value = text;
                textarea.classList.remove('hidden');
            } catch (error) {
                alert("エラーが発生しました: " + error.message);
            } finally {
                btn.innerHTML = '✨ AIでドラフトを再作成する';
                btn.disabled = false;
            }
        }

        // --- チャットボット処理 ---
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('open');
        }

        function handleChatKeypress(e) {
            if(e.key === 'Enter') sendChat();
        }

        async function sendChat() {
            const inputEl = document.getElementById('chat-input-text');
            const text = inputEl.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                alert("Gemini APIキーが設定されていません。右上の「API設定」から登録してください。");
                return;
            }

            // ユーザーメッセージ追加
            addChatMessage('user', text);
            inputEl.value = '';
            
            // 履歴への追加
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            // ローディング表示
            const loaderId = 'loader-' + Date.now();
            addChatMessage('bot', '<span class="loader" style="border-top-color:var(--primary); width:15px; height:15px; border-width:2px;"></span>', loaderId);

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                // システムプロンプト的に役割を指示するため、初回なら履歴に注入することも可能だが、簡易的に直近のメッセージに文脈を付与する。
                const payload = {
                    contents: chatHistory,
                    systemInstruction: {
                        parts: [{ text: "あなたはプロの補助金コンサルタントです。親切丁寧かつ簡潔に回答してください。"}]
                    }
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "通信エラー");
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });

                // ローディングを消して回答を表示
                document.getElementById(loaderId).remove();
                addChatMessage('bot', botReply.replace(/\n/g, '<br>'));

            } catch (error) {
                document.getElementById(loaderId).remove();
                addChatMessage('bot', "⚠️ エラーが発生しました: " + error.message);
                chatHistory.pop(); // 失敗した履歴を削除
            }
        }

        function addChatMessage(sender, htmlText, id = null) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `msg msg-${sender}`;
            if(id) div.id = id;
            div.innerHTML = htmlText;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // --- Gemini API 共通呼び出し関数 ---
        async function callGeminiAPI(apiKey, prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "APIリクエストに失敗しました");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

    </script>
</body>
